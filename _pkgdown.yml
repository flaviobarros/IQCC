url: https://flaviobarros.github.io/IQCC/

template:
  bootstrap: 5
  light-switch: true

development:
  mode: release

navbar:
  structure:
    left: [get_started, articles, reference, news]
    right: [search, github]
  components:
    get_started:
      text: Get started
      href: articles/getting-started-with-iqcc.html
    articles:
      text: Articles
      menu:
      - text: Getting started with IQCC
        href: articles/getting-started-with-iqcc.html
      - text: Package overview and positioning
        href: articles/iqcc-positioning.html
      - text: High-quality processes and rare nonconformities
        href: articles/high-quality-processes.html
      - text: Univariate dispersion monitoring
        href: articles/univariate-dispersion-monitoring.html
      - text: Multivariate process monitoring
        href: articles/multivariate-monitoring.html
      - text: Statistical foundations
        href: articles/statistical-foundations.html
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: News
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/flaviobarros/IQCC
      aria-label: GitHub repository

articles:
- title: Overview
  navbar: ~
  contents:
  - getting-started-with-iqcc
  - iqcc-positioning
- title: Statistical methods
  contents:
  - high-quality-processes
  - univariate-dispersion-monitoring
  - multivariate-monitoring
  - statistical-foundations

reference:
- title: Package overview
  contents:
  - IQCC-package

- title: Univariate location and dispersion
  desc: Shewhart charts and distribution-aware limits for continuous measurements.
  contents:
  - cchart.Xbar
  - cchart.Xbar1
  - cchart.Xbar2
  - cchart.Xbar_R
  - cchart.R
  - r_shewhart_limits
  - r_exact_limits
  - cchart.S
  - alpha.risk
  - c4
  - d2
  - d3

- title: Attribute control charts
  desc: Limits and false-alarm calculations for binomial and Poisson monitoring.
  contents:
  - pchart_limits
  - pchart_alpha_risk
  - cchart.p
  - uchart_limits
  - uchart_alpha_risk
  - cchart.u

- title: Double-sampling np charts
  desc: Exact-binomial design, performance evaluation, and operational monitoring.
  contents:
  - dsnp_prob_accept
  - dsnp_arl
  - dsnp_ass
  - dsnp_limits
  - dsnp_design
  - print.dsnp_design
  - cchart.DSnp
  - print.cchart.DSnp
