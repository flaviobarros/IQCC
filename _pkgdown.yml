- title: Multivariate monitoring
  desc: Hotelling T-squared and generalized variance charts.
  contents:
  - T2.1
  - T2.2
  - cchart.T2.1
  - cchart.T2.2
  - gv_stat
  - gv_limits
  - gv_alpha_risk
