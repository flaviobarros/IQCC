  - trv_stat
  - trv_limits
  - trv_alpha_risk
  - cchart.trV
  - print.cchart.GV
  - plot.cchart.GV

- title: Data preparation and utilities
  contents:
  - data.1
  - data.2
  - add.data
  - remove.data
  - stats
  - table.const
  - table.qtukey

- title: Example datasets
  contents:
