name: check-urls

on:
  push:
    branches: [master]
    paths:
      - DESCRIPTION
      - README.md
      - "R/**"
      - "man/**"
      - "vignettes/**"
      - ".github/workflows/check-urls.yaml"
  pull_request:
    branches: [master]
    paths:
      - DESCRIPTION
      - README.md
      - "R/**"
      - "man/**"
      - "vignettes/**"
      - ".github/workflows/check-urls.yaml"
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  check-urls:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::urlchecker

      - name: Check package URLs
        run: urlchecker::url_check()
        shell: Rscript {0}
