name: documentation-quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: documentation-quality-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  documentation-quality:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::spelling
          needs: check

      - name: Regenerate roxygen documentation
        run: devtools::document()
        shell: Rscript {0}

      - name: Require synchronized generated documentation
        run: git diff --exit-code -- DESCRIPTION NAMESPACE man
        shell: bash

      - name: Check package manuals and vignettes spelling
        run: |
          misspellings <- spelling::spell_check_package()

          # Root release files are maintained by dedicated integration PRs.
          is_root_release_file <- function(location) {
            grepl("^(NEWS|README)(\\.[^:]+)?:", location)
          }
          misspellings$found <- lapply(
            misspellings$found,
            function(locations) locations[!is_root_release_file(locations)]
          )
          misspellings <- misspellings[lengths(misspellings$found) > 0, ]

          if (nrow(misspellings) > 0) {
            print(misspellings)
            quit(status = 1)
          }
        shell: Rscript {0}
