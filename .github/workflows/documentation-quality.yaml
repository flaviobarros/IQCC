name: documentation-quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: documentation-quality-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  documentation-quality:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: devtools@2.4.5, any::spelling, roxygen2@7.3.2
          needs: check

      - name: Regenerate roxygen documentation
        run: devtools::document()
        shell: Rscript {0}

      - name: Require synchronized generated documentation
        run: |
          documentation_status=$(git status --porcelain --untracked-files=all -- DESCRIPTION NAMESPACE man)
          if [ -n "$documentation_status" ]; then
            echo "::error::devtools::document() changed generated documentation"
            printf '%s\n' "$documentation_status"
            git diff -- DESCRIPTION NAMESPACE man
            exit 1
          fi
        shell: bash

      - name: Check package spelling
        run: |
          misspellings <- spelling::spell_check_package()
          if (nrow(misspellings) > 0) {
            print(misspellings)
            quit(status = 1)
          }
        shell: Rscript {0}
